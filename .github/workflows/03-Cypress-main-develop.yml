name: 03-Cypress-main-develop
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci
      - name: Detect Cypress specs
        id: cypress-specs
        run: |
          if [ -d "apps/frontend/cypress/e2e" ]; then
            specs_count=$(find apps/frontend/cypress/e2e -type f \( -name "*.cy.ts" -o -name "*.cy.js" -o -name "*.cy.tsx" -o -name "*.cy.jsx" \) | wc -l)
          else
            specs_count=0
          fi
          if [ "$specs_count" -gt 0 ]; then
            echo "has_specs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_specs=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Cypress (runtime)
        if: steps.cypress-specs.outputs.has_specs == 'true'
        working-directory: apps/frontend
        run: npm install --no-save cypress start-server-and-test
      - name: Run Cypress E2E
        if: steps.cypress-specs.outputs.has_specs == 'true'
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/frontend
          start: npm run start -- --host 0.0.0.0 --port 4200
          wait-on: 'http://127.0.0.1:4200'
          command: npx cypress run --e2e --spec "cypress/e2e/**/*.cy.{js,ts,jsx,tsx}" --config-file cypress.config.js
      - name: Cypress skipped notice
        if: steps.cypress-specs.outputs.has_specs != 'true'
        run: echo "Cypress E2E skipped - no spec files found"
      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: apps/frontend/cypress/screenshots/
          retention-days: 5
