name: 03-Cypress-main-develop

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  cypress:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsw01_practica02
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dsw01_practica02"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm install

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Wait for PostgreSQL
        run: until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

      - name: Build backend
        working-directory: apps/backend
        env:
          APP_DB_URL: jdbc:postgresql://localhost:5432/dsw01_practica02
          APP_DB_USERNAME: postgres
          APP_DB_PASSWORD: postgres
        run: mvn -B -ntp clean package -DskipTests

      - name: Start backend
        working-directory: apps/backend
        env:
          APP_DB_URL: jdbc:postgresql://localhost:5432/dsw01_practica02
          APP_DB_USERNAME: postgres
          APP_DB_PASSWORD: postgres
        run: java -jar target/*.jar &

      - name: Start frontend
        working-directory: apps/frontend
        run: npx ng serve --port 4200 --host 0.0.0.0 --no-live-reload &

      - name: Wait for backend and frontend
        working-directory: apps/frontend
        run: npx wait-on http://localhost:4200 http://localhost:8080/actuator/health --timeout 180000

      - name: Run Cypress tests
        working-directory: apps/frontend
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:8080
