name: CI

on:
  push:
    branches:
      - master
      - developers
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests
        run: mvn -B -ntp clean test

  frontend-tests:
    name: Frontend Unit Tests (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

  e2e-cypress:
    name: E2E Tests (Cypress)
    runs-on: ubuntu-latest
    needs:
      - frontend-tests
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          working-directory: apps/frontend
          install-command: npm ci
          start: npm start -- --host 0.0.0.0 --port 4200
          wait-on: http://localhost:4200
          wait-on-timeout: 120
          browser: chrome
          config-file: cypress.config.js
