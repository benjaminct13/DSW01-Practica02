name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  backend:
    name: Backend Java
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsw01_practica02
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_DB_URL: jdbc:postgresql://localhost:5432/dsw01_practica02
      APP_DB_USERNAME: postgres
      APP_DB_PASSWORD: postgres

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Wait for PostgreSQL
        run: until pg_isready -h localhost -p 5432 -U postgres; do sleep 1; done

      - name: Build and test backend
        working-directory: apps/backend
        run: mvn -B -ntp clean package -DskipTests

  sonar:
    name: SonarCloud Analysis
    needs: backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend
        working-directory: apps/backend
        run: mvn -B -ntp clean package -DskipTests

      - name: SonarCloud Analysis
        working-directory: apps/backend
        run: mvn -B sonar:sonar -Dsonar.projectKey=benjaminct13_DSW01-Practica02 -Dsonar.organization=benjaminct13 -Dsonar.host.url=https://sonarcloud.io -Dsonar.java.binaries=target/classes
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  frontend:
    name: Frontend Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Fix ng permissions
        working-directory: apps/frontend
        run: chmod +x node_modules/.bin/ng

      - name: Build frontend
        working-directory: apps/frontend
        run: node_modules/.bin/ng build

  cypress:
    name: Cypress E2E
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dsw01_practica02
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: apps/frontend
        run: npm ci

      - name: Start backend
        working-directory: apps/backend
        run: |
          mvn -B -ntp spring-boot:run &
          echo $! > backend.pid

      - name: Start frontend
        working-directory: apps/frontend
        run: |
          node_modules/.bin/ng serve --host 0.0.0.0 --port 4200 &
          echo $! > frontend.pid

      - name: Wait for services
        run: |
          until nc -z localhost 8080; do sleep 1; done
          until nc -z localhost 4200; do sleep 1; done

      - name: Run Cypress tests
        working-directory: apps/frontend
        run: npx cypress run --headless

  docker:
    name: Build and Push Docker Images
    needs: [sonar, cypress]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dsw01-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/dsw01-frontend:latest