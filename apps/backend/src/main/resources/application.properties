spring.application.name=dsw01-practica02

# Server
server.port=8080

# PostgreSQL (Docker)
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/dsw01_practica02}
spring.datasource.username=${APP_DB_USERNAME:postgres}
spring.datasource.password=${APP_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Basic Auth (development only)
spring.security.user.name=${APP_SECURITY_USER:admin}
spring.security.user.password=${APP_SECURITY_PASSWORD:admin123}
spring.security.user.roles=${APP_SECURITY_ROLES:ADMIN}

# Auth policies
app.auth.session-hours=${APP_AUTH_SESSION_HOURS:8}
app.auth.lockout.max-failures=${APP_AUTH_LOCKOUT_MAX_FAILURES:5}
app.auth.lockout.minutes=${APP_AUTH_LOCKOUT_MINUTES:15}
app.auth.audit.retention-days=${APP_AUTH_AUDIT_RETENTION_DAYS:90}

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Actuator (optional)
management.endpoints.web.exposure.include=health,info

# JSON strict mode
spring.jackson.deserialization.fail-on-unknown-properties=true
